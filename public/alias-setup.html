<!DOCTYPE html>
<html lang="en" data-theme="void">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptPact | Initialize Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&family=Rajdhani:wght@500;600;700&display=swap');

        /* --- IDENTICAL THEME ENGINE FROM LOGIN --- */
        :root[data-theme="void"] { 
            --bg-body: #030305; --bg-panel: rgba(10, 10, 14, 0.8); --primary: #ffffff; --border: rgba(255, 255, 255, 0.1); 
            --text-main: #ffffff; --text-muted: #666666; --glow: rgba(255,255,255,0.03); 
        }
        :root[data-theme="retro"] { 
            --bg-body: #131211; --bg-panel: rgba(38, 36, 34, 0.8); --primary: #ffb347; --border: rgba(255, 179, 71, 0.2); 
            --text-main: #e7e5e4; --text-muted: #8a8581; --glow: rgba(255, 179, 71, 0.1); 
        }
        :root[data-theme="zen"] { 
            --bg-body: #0a0f1c; --bg-panel: rgba(15, 23, 42, 0.8); --primary: #38bdf8; --border: rgba(56, 189, 248, 0.2); 
            --text-main: #f1f5f9; --text-muted: #64748b; --glow: rgba(56, 189, 248, 0.1); 
        }
        :root[data-theme="light"] { 
            --bg-body: #f3f4f6; --bg-panel: rgba(255, 255, 255, 0.9); --primary: #2563eb; --border: rgba(0, 0, 0, 0.1); 
            --text-main: #111827; --text-muted: #6b7280; --glow: rgba(0, 0, 0, 0.05); 
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(var(--border) 1px, transparent 1px); 
            background-size: 40px 40px;
            transition: background-color 0.8s ease, color 0.8s ease;
        }

        .font-brand { font-family: 'Rajdhani', sans-serif; } 
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        #setupCard { 
            background: var(--bg-panel);
            -webkit-backdrop-filter: blur(20px); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--border); 
            box-shadow: 0 10px 40px var(--glow);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modern-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        :root[data-theme="light"] .modern-input { background: rgba(255, 255, 255, 0.5); }

        .modern-input:focus {
            border-color: var(--primary);
            outline: none;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 10px var(--glow);
        }

        .primary-btn {
            background-color: var(--primary);
            color: var(--bg-body);
            transition: all 0.3s ease;
        }
        .primary-btn:hover { 
            opacity: 0.9; 
            transform: translateY(-1px);
            box-shadow: 0 5px 15px var(--glow);
        }

        /* Ambient scanline effect */
        .scanline {
            width: 100%; height: 2px; background: var(--primary); opacity: 0.05;
            position: absolute; top: 0; left: 0;
            animation: scan 8s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center relative overflow-hidden">

    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-[var(--primary)] rounded-full mix-blend-overlay filter blur-[128px] opacity-5 pointer-events-none"></div>

    <div id="setupCard" class="w-full max-w-[420px] rounded-2xl p-10 z-10 relative overflow-hidden">
        <div class="scanline"></div>
        
        <div class="text-center mb-10">
            <h2 class="font-brand text-3xl tracking-[0.2em] uppercase mb-3">Initialize <span style="color: var(--primary)">Identity</span></h2>
            <div class="flex items-center justify-center gap-3 opacity-40">
                <div class="h-px w-6 bg-[var(--primary)]"></div>
                <p class="font-mono text-[9px] uppercase tracking-[0.3em]">Protocol: Alias_Selection</p>
                <div class="h-px w-6 bg-[var(--primary)]"></div>
            </div>
        </div>

        <form onsubmit="finalizeAlias(event)" class="space-y-8">
            <div class="space-y-2">
                <label class="text-[10px] text-[var(--text-muted)] tracking-[0.2em] uppercase ml-1 font-semibold">New Agent Alias</label>
                <input type="text" id="newAlias" required minlength="3" 
                    class="w-full modern-input p-4 rounded-xl font-mono text-sm focus:outline-none" 
                    placeholder="e.g. ShadowCipher" autocomplete="off">
                <p class="text-[9px] text-[var(--text-muted)] font-mono italic ml-1 mt-2">* This will be your permanent public key identifier.</p>
            </div>

            <button type="submit" id="confirmBtn" class="w-full py-4 primary-btn font-bold text-[10px] tracking-[0.3em] rounded-xl font-mono hover:opacity-90 transition-all uppercase shadow-lg">
                Confirm Codename
            </button>
        </form>
    </div>

    <script>
        // IMMEDIATELY apply theme from localStorage
        function applyTheme() {
            const savedTheme = localStorage.getItem('app-theme') || 'void';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        applyTheme();

        async function finalizeAlias(e) {
            e.preventDefault();
            const alias = document.getElementById('newAlias').value.trim();
            const token = localStorage.getItem('auth-token');
            const btn = document.getElementById('confirmBtn');

            if (!alias) return;

            btn.innerText = "UPDATING MATRIX...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/update-alias', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'auth-token': token 
                    },
                    body: JSON.stringify({ newUsername: alias })
                });

                const data = await res.json();
                if (res.ok) {
                    // Update token in case the backend issued a new one with the new name
                    if (data.token) localStorage.setItem('auth-token', data.token);
                    window.location.href = '/'; 
                } else {
                    alert(data.message || "Alias already taken by another agent.");
                    btn.innerText = "CONFIRM CODENAME";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error("Setup error:", err);
                btn.innerText = "CONFIRM CODENAME";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
