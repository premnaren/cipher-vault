<!DOCTYPE html>
<html lang="en" data-theme="void">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptPact | Initialize Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&family=Rajdhani:wght@500;600;700&display=swap');

        :root[data-theme="void"] { 
            --bg-body: #030305; --bg-panel: rgba(10, 10, 14, 0.75); --primary: #ffffff; --border: rgba(255, 255, 255, 0.1); 
            --text-main: #ffffff; --text-muted: #666666; --glow: 0 0 40px rgba(255,255,255,0.03); 
        }

        body { 
            background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 40px 40px;
        }

        /* Texture Overlay for extra depth */
        body::before {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05; pointer-events: none; z-index: 1;
        }

        .font-brand { font-family: 'Rajdhani', sans-serif; } 
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        #setupCard { 
            background: var(--bg-panel);
            /* SAFARI SUPPORTED BLUR */
            -webkit-backdrop-filter: blur(20px); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--border); 
            box-shadow: var(--glow); 
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modern-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .modern-input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .scanline {
            width: 100%; height: 2px; background: rgba(255, 255, 255, 0.05);
            position: absolute; top: 0; left: 0;
            animation: scan 6s linear infinite;
        }
        @keyframes scan { 0% { top: -2px; } 100% { top: 100%; } }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center relative overflow-hidden">

    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-white rounded-full mix-blend-overlay filter blur-[128px] opacity-10 pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-gray-500 rounded-full mix-blend-overlay filter blur-[100px] opacity-5 pointer-events-none"></div>

    <div id="setupCard" class="w-full max-w-[420px] rounded-2xl p-10 relative overflow-hidden">
        <div class="scanline"></div>
        
        <div class="text-center mb-10">
            <h2 class="font-brand text-3xl tracking-[0.2em] uppercase mb-3">Initialize <span class="text-white">Identity</span></h2>
            <div class="flex items-center justify-center gap-3 opacity-40">
                <div class="h-px w-6 bg-white"></div>
                <p class="font-mono text-[9px] uppercase tracking-[0.3em]">Protocol: Alias_Selection</p>
                <div class="h-px w-6 bg-white"></div>
            </div>
        </div>

        <form onsubmit="finalizeAlias(event)" class="space-y-8">
            <div class="space-y-2">
                <label class="text-[10px] text-[var(--text-muted)] tracking-[0.2em] uppercase ml-1 font-semibold">New Agent Alias</label>
                <input type="text" id="newAlias" required minlength="3" 
                    class="w-full modern-input p-4 rounded-xl font-mono text-sm focus:outline-none text-white" 
                    placeholder="e.g. ShadowCipher" autocomplete="off">
                <p class="text-[9px] text-[var(--text-muted)] font-mono italic ml-1 mt-2">* This will be your permanent public key identifier.</p>
            </div>

            <button type="submit" id="confirmBtn" class="w-full py-4 bg-white text-black font-bold text-[10px] tracking-[0.3em] rounded-xl font-mono hover:bg-gray-200 transition-all uppercase shadow-lg">
                Confirm Codename
            </button>
        </form>
    </div>

    <div id="toastContainer" class="fixed bottom-8 right-8 z-[200]"></div>

    <script>
        const theme = localStorage.getItem('app-theme') || 'void';
        document.documentElement.setAttribute('data-theme', theme);

        async function finalizeAlias(e) {
            e.preventDefault();
            const alias = document.getElementById('newAlias').value.trim();
            const token = localStorage.getItem('auth-token');
            const btn = document.getElementById('confirmBtn');

            if (!alias) return;

            btn.innerText = "UPDATING MATRIX...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/update-alias', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'auth-token': token 
                    },
                    body: JSON.stringify({ newUsername: alias })
                });

                const data = await res.json();
                if (res.ok) {
                    if (data.token) localStorage.setItem('auth-token', data.token);
                    window.location.href = '/'; 
                } else {
                    alert(data.message || "Alias already taken.");
                    btn.innerText = "CONFIRM CODENAME";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btn.innerText = "CONFIRM CODENAME";
            }
        }
    </script>
</body>
</html>
