<!DOCTYPE html>
<html lang="en" data-theme="retro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptPact | Gateway</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;900&display=swap');

        /* --- THEME SYSTEM --- */
        :root[data-theme="retro"] { 
            --bg-body: #1c1b1a; --bg-panel: #262422; --primary: #ffb347; --accent: #d48839; --border: #57534e; 
            --text-main: #e7e5e4; --text-muted: #a8a29e; --glow: 0 0 15px rgba(255, 179, 71, 0.15); 
            --shadow-3d: 8px 8px 0px #443f3c; 
        }
        :root[data-theme="zen"] { 
            --bg-body: #0f172a; --bg-panel: #1e293b; --primary: #38bdf8; --accent: #818cf8; --border: #475569; 
            --text-main: #f1f5f9; --text-muted: #94a3b8; --glow: none; 
            --shadow-3d: 8px 8px 0px #334155; 
        }
        :root[data-theme="light"] { 
            --bg-body: #e5e5e5; --bg-panel: #ffffff; --primary: #2563eb; --accent: #db2777; --border: #a3a3a3; 
            --text-main: #171717; --text-muted: #525252; --glow: 0 4px 6px rgba(0,0,0,0.1); 
            --shadow-3d: 8px 8px 0px #737373; 
        }
        :root[data-theme="void"] { 
            --bg-body: #050508; --bg-panel: #0f1015; --primary: #00f3ff; --accent: #bc13fe; --border: #334155; 
            --text-main: #e2e8f0; --text-muted: #64748b; --glow: 0 0 20px rgba(0, 243, 255, 0.2); 
            --shadow-3d: 8px 8px 0px #1e293b; 
        }
        
        body { 
            background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 30px 30px;
            transition: all 0.5s ease;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; } 
        .mono { font-family: 'Space Mono', monospace; }
        
        #authCard { border: 2px solid var(--border); box-shadow: var(--shadow-3d); transition: all 0.3s ease; }
        
        * { transition: border-color 0.3s ease, background-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center relative overflow-hidden">

    <div id="toastContainer" class="fixed bottom-5 right-5 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <div class="fixed top-6 right-6 z-50">
        <button onclick="cycleTheme()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-[var(--border)] bg-[var(--bg-panel)] text-[var(--primary)] hover:bg-[var(--primary)] hover:text-[var(--bg-body)] hover:scale-110 transition-all shadow-[var(--glow)] text-xl" title="Switch Theme">🎨</button>
    </div>

    <div class="mb-8 text-center">
        <h1 class="text-5xl font-black tracking-widest orbitron mb-2">Crypt<span class="text-[var(--primary)]">Pact</span></h1>
        <p class="text-[var(--text-muted)] font-mono text-xs tracking-[0.3em]">SECURE ACCESS GATEWAY</p>
    </div>

    <div id="authCard" class="bg-[var(--bg-panel)] w-full max-w-md rounded-xl relative overflow-hidden flex flex-col">
        
        <div class="flex border-b border-[var(--border)]">
            <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-4 text-xs font-bold tracking-widest font-mono text-[var(--primary)] border-b-2 border-[var(--primary)] bg-[var(--bg-body)] transition-all">LOGIN</button>
            <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-4 text-xs font-bold tracking-widest font-mono text-[var(--text-muted)] border-b-2 border-transparent hover:text-[var(--text-main)] transition-all">REGISTER</button>
        </div>

        <div class="p-8 space-y-6">
            <form id="authForm" onsubmit="handleAuth(event)" class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-[var(--text-muted)] uppercase mb-2 block font-mono">AGENT ID (USERNAME)</label>
                    <input type="text" id="username" required autocomplete="off" class="w-full bg-[var(--bg-body)] border border-[var(--border)] p-3 rounded mono text-sm focus:border-[var(--primary)] outline-none text-[var(--text-main)] transition-colors" placeholder="Enter username...">
                </div>
                
                <div>
                    <label class="text-[10px] font-bold text-[var(--text-muted)] uppercase mb-2 block font-mono">PASSPHRASE</label>
                    <input type="password" id="password" required class="w-full bg-[var(--bg-body)] border border-[var(--border)] p-3 rounded mono text-sm focus:border-[var(--primary)] outline-none text-[var(--text-main)] transition-colors" placeholder="••••••••">
                </div>

                <button type="submit" id="submitBtn" class="w-full py-4 bg-[var(--primary)] text-black font-black tracking-widest rounded hover:shadow-[0_0_20px_var(--primary)] transition-all orbitron mt-4">
                    INITIALIZE UPLINK
                </button>
            </form>
        </div>
    </div>

    <script>
        let currentMode = 'login';

        // --- TOAST NOTIFICATION SYSTEM ---
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            let colorClass = 'border-[var(--primary)] text-[var(--primary)]';
            let icon = 'ℹ️';
            
            if (type === 'error') {
                colorClass = 'border-red-500 text-red-500 bg-red-900/10';
                icon = '⚠️';
            } else if (type === 'success') {
                colorClass = 'border-green-500 text-green-500 bg-green-900/10';
                icon = '✅';
            } else {
                colorClass = 'border-[var(--primary)] text-[var(--primary)] bg-[var(--bg-body)]';
            }

            toast.className = `bg-[var(--bg-panel)] border ${colorClass} p-3 rounded shadow-[0_0_15px_currentColor] font-mono text-xs flex items-center gap-3 transform translate-x-[120%] transition-transform duration-300 pointer-events-auto backdrop-blur-md`;
            toast.innerHTML = `<span class="text-lg">${icon}</span> <span>${msg}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-[120%]'), 10);
            setTimeout(() => {
                toast.classList.add('translate-x-[120%]');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- THEME LOGIC ---
        const themes = ['retro', 'light', 'zen', 'void'];
        let currentThemeIndex = 0;

        function initTheme() {
            const savedTheme = localStorage.getItem('app-theme') || 'retro'; 
            document.documentElement.setAttribute('data-theme', savedTheme);
            currentThemeIndex = themes.indexOf(savedTheme);
            if(currentThemeIndex === -1) currentThemeIndex = 0;
        }

        function cycleTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const newTheme = themes[currentThemeIndex];
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('app-theme', newTheme);
        }
        initTheme();

        // --- TAB SWITCHING ---
        function switchTab(mode) {
            currentMode = mode;
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const btn = document.getElementById('submitBtn');

            if (mode === 'login') {
                tabLogin.className = "flex-1 py-4 text-xs font-bold tracking-widest font-mono text-[var(--primary)] border-b-2 border-[var(--primary)] bg-[var(--bg-body)] transition-all";
                tabRegister.className = "flex-1 py-4 text-xs font-bold tracking-widest font-mono text-[var(--text-muted)] border-b-2 border-transparent hover:text-[var(--text-main)] transition-all";
                btn.innerText = "INITIALIZE UPLINK";
            } else {
                tabRegister.className = "flex-1 py-4 text-xs font-bold tracking-widest font-mono text-[var(--primary)] border-b-2 border-[var(--primary)] bg-[var(--bg-body)] transition-all";
                tabLogin.className = "flex-1 py-4 text-xs font-bold tracking-widest font-mono text-[var(--text-muted)] border-b-2 border-transparent hover:text-[var(--text-main)] transition-all";
                btn.innerText = "REGISTER AGENT";
            }
        }

        // --- AUTH API LOGIC ---
        async function handleAuth(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            
            if(!user || !pass) {
                return showToast("Credentials required.", "error");
            }

            const endpoint = currentMode === 'login' ? '/api/auth/login' : '/api/auth/register';
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            btn.innerText = "PROCESSING...";
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await res.json();

                if (res.ok) {
                    if (currentMode === 'register') {
                        showToast("Agent Registered. Redirecting...", "success");
                        setTimeout(() => switchTab('login'), 1000);
                        document.getElementById('password').value = '';
                    } else {
                        showToast("Access Granted. Securing connection...", "success");
                        localStorage.setItem('auth-token', data.token);
                        setTimeout(() => { window.location.href = '/'; }, 800);
                    }
                } else {
                    showToast(data.message || "Authentication failed.", "error");
                }
            } catch (err) {
                showToast("Server connection lost.", "error");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
