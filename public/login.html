<!DOCTYPE html>
<html lang="en" data-theme="void">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptPact | Gateway</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Rajdhani:wght@500;600;700&display=swap');

        /* --- MODERN THEME SYSTEM --- */
        :root[data-theme="retro"] { 
            --bg-body: #131211; --bg-panel: rgba(38, 36, 34, 0.7); --primary: #ffb347; --accent: #d48839; --border: rgba(255, 179, 71, 0.2); 
            --text-main: #e7e5e4; --text-muted: #8a8581; --glow: 0 0 20px rgba(255, 179, 71, 0.1); 
        }
        :root[data-theme="zen"] { 
            --bg-body: #0a0f1c; --bg-panel: rgba(15, 23, 42, 0.7); --primary: #38bdf8; --accent: #818cf8; --border: rgba(56, 189, 248, 0.2); 
            --text-main: #f1f5f9; --text-muted: #64748b; --glow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        :root[data-theme="light"] { 
            --bg-body: #f3f4f6; --bg-panel: rgba(255, 255, 255, 0.8); --primary: #2563eb; --accent: #db2777; --border: rgba(0, 0, 0, 0.1); 
            --text-main: #111827; --text-muted: #6b7280; --glow: 0 10px 40px rgba(0,0,0,0.08); 
        }
        :root[data-theme="void"] { 
            --bg-body: #030305; --bg-panel: rgba(10, 10, 14, 0.6); --primary: #ffffff; --accent: #888888; --border: rgba(255, 255, 255, 0.1); 
            --text-main: #ffffff; --text-muted: #666666; --glow: 0 0 40px rgba(255,255,255,0.03); 
        }
        
        body { 
            background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 40px 40px;
            transition: background-color 0.8s ease, color 0.8s ease;
        }

        .font-brand { font-family: 'Rajdhani', sans-serif; } 
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Sleek Glassmorphism Card */
        #authCard { 
            background: var(--bg-panel);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border); 
            box-shadow: var(--glow); 
            transition: all 0.5s ease; 
        }

        /* Minimalist Input Fields */
        .modern-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid transparent;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .modern-input:focus {
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid var(--primary);
        }
        :root[data-theme="light"] .modern-input { background: rgba(255,255,255,0.5); }
        :root[data-theme="light"] .modern-input:focus { background: rgba(255,255,255,0.9); }
        
        /* Smooth Form Transition Animation */
        @keyframes formFadeSlide {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-form-switch {
            animation: formFadeSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        * { transition: border-color 0.3s ease, background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center relative overflow-hidden">

    <div id="toastContainer" class="fixed bottom-5 right-5 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <div class="fixed top-8 right-8 z-50">
        <button onclick="cycleTheme()" class="w-10 h-10 flex items-center justify-center rounded-full border border-[var(--border)] bg-[var(--bg-panel)] text-[var(--text-muted)] hover:text-[var(--primary)] hover:border-[var(--primary)] transition-all backdrop-blur text-sm" title="Switch Theme">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
    </div>

    <div class="mb-10 text-center transform translate-y-4">
        <h1 class="text-4xl font-brand font-semibold tracking-[0.2em] mb-3">CRYPT<span class="text-[var(--primary)]">PACT</span></h1>
        <div class="flex items-center justify-center gap-4 opacity-60">
            <div class="h-px w-8 bg-[var(--text-muted)]"></div>
            <p class="font-mono text-[10px] tracking-[0.4em] uppercase text-[var(--text-muted)]">Authentication</p>
            <div class="h-px w-8 bg-[var(--text-muted)]"></div>
        </div>
    </div>

    <div id="authCard" class="w-full max-w-[420px] rounded-2xl relative overflow-hidden flex flex-col z-10">
        
        <div class="px-8 pt-8 pb-4">
            <div class="flex p-1 bg-black/20 rounded-lg border border-[var(--border)] relative">
                <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-2 text-[11px] font-medium tracking-widest font-mono text-[var(--bg-body)] bg-[var(--primary)] rounded-md transition-all shadow-sm z-10 relative">SIGN IN</button>
                <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-2 text-[11px] font-medium tracking-widest font-mono text-[var(--text-muted)] hover:text-[var(--text-main)] rounded-md transition-all z-10 relative bg-transparent">CREATE ID</button>
            </div>
        </div>

        <div class="px-8 pb-8 pt-2">
            <form id="authForm" onsubmit="handleAuth(event)" class="space-y-6 animate-form-switch">
                
                <div class="space-y-1">
                    <label class="text-[10px] text-[var(--text-muted)] tracking-widest uppercase ml-1">Identity Alias</label>
                    <input type="text" id="username" required autocomplete="off" class="w-full modern-input p-3 rounded-lg font-mono text-sm text-[var(--text-main)] focus:outline-none" placeholder="Enter your alias">
                </div>
                
                <div class="space-y-1">
                    <label class="text-[10px] text-[var(--text-muted)] tracking-widest uppercase ml-1">Security Key</label>
                    <input type="password" id="password" required class="w-full modern-input p-3 rounded-lg font-mono text-sm text-[var(--text-main)] focus:outline-none tracking-widest" placeholder="••••••••">
                </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="w-full py-4 bg-[var(--primary)] text-[var(--bg-body)] font-semibold text-xs tracking-[0.2em] rounded-lg hover:opacity-90 transition-all font-mono shadow-[var(--glow)]">
                        AUTHENTICATE
                    </button>
                </div>

                <div class="relative flex items-center justify-center mt-6 mb-6">
                    <div class="absolute w-full border-t border-[var(--border)]"></div>
                    <span class="relative bg-transparent px-3 text-[10px] text-[var(--text-muted)] font-mono tracking-widest uppercase" style="background-color: var(--bg-panel);">OR</span>
                </div>

                <div class="flex justify-center w-full mt-4">
                    <div id="g_id_onload"
                        data-client_id="298361900430-hocues839g7fp7nogs3db9vei548mi3l.apps.googleusercontent.com"
                        data-context="signin"
                        data-ux_mode="popup"
                        data-callback="handleGoogleAuth"
                        data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin"
                        data-type="standard"
                        data-shape="rectangular"
                        data-theme="filled_black"
                        data-text="continue_with"
                        data-size="large"
                        data-logo_alignment="left"
                        data-width="356">
                    </div>
                </div>

            </form>
        </div>
    </div>

    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-[var(--primary)] rounded-full mix-blend-multiply filter blur-[128px] opacity-10 pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-[var(--accent)] rounded-full mix-blend-multiply filter blur-[128px] opacity-10 pointer-events-none"></div>

    <script>
        let currentMode = 'login';

        // --- TOAST NOTIFICATION SYSTEM ---
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            let colorClass = 'border-[var(--primary)] text-[var(--primary)]';
            let icon = '⚡';
            
            if (type === 'error') {
                colorClass = 'border-red-500/50 text-red-500 bg-red-900/10';
                icon = '✕';
            } else if (type === 'success') {
                colorClass = 'border-green-500/50 text-green-500 bg-green-900/10';
                icon = '✓';
            } else {
                colorClass = 'border-[var(--border)] text-[var(--text-main)] bg-[var(--bg-panel)]';
            }

            toast.className = `backdrop-blur-md border ${colorClass} px-4 py-3 rounded-lg shadow-2xl font-mono text-xs flex items-center gap-3 transform translate-x-[120%] transition-transform duration-300 pointer-events-auto`;
            toast.innerHTML = `<span class="text-sm opacity-80">${icon}</span> <span class="tracking-wide">${msg}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-[120%]'), 10);
            setTimeout(() => {
                toast.classList.add('translate-x-[120%]');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- THEME LOGIC ---
        const themes = ['void', 'retro', 'zen', 'light']; 
        let currentThemeIndex = 0;

        function initTheme() {
            const savedTheme = localStorage.getItem('app-theme') || 'void'; 
            document.documentElement.setAttribute('data-theme', savedTheme);
            currentThemeIndex = themes.indexOf(savedTheme);
            if(currentThemeIndex === -1) currentThemeIndex = 0;
        }

        function cycleTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const newTheme = themes[currentThemeIndex];
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('app-theme', newTheme);
        }
        initTheme();

        // --- TAB SWITCHING & ANIMATION ---
        function switchTab(mode) {
            if (currentMode === mode) return; 
            
            currentMode = mode;
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const btn = document.getElementById('submitBtn');
            const form = document.getElementById('authForm');
            const userInput = document.getElementById('username');
            const passInput = document.getElementById('password');

            userInput.value = '';
            passInput.value = '';

            form.classList.remove('animate-form-switch');
            void form.offsetWidth; 
            form.classList.add('animate-form-switch');

            if (mode === 'login') {
                tabLogin.className = "flex-1 py-2 text-[11px] font-medium tracking-widest font-mono text-[var(--bg-body)] bg-[var(--primary)] rounded-md transition-all shadow-sm z-10 relative";
                tabRegister.className = "flex-1 py-2 text-[11px] font-medium tracking-widest font-mono text-[var(--text-muted)] hover:text-[var(--text-main)] rounded-md transition-all z-10 relative bg-transparent";
                btn.innerText = "AUTHENTICATE";
            } else {
                tabRegister.className = "flex-1 py-2 text-[11px] font-medium tracking-widest font-mono text-[var(--bg-body)] bg-[var(--primary)] rounded-md transition-all shadow-sm z-10 relative";
                tabLogin.className = "flex-1 py-2 text-[11px] font-medium tracking-widest font-mono text-[var(--text-muted)] hover:text-[var(--text-main)] rounded-md transition-all z-10 relative bg-transparent";
                btn.innerText = "ESTABLISH IDENTITY";
            }
            
            userInput.focus();
        }

        // --- GOOGLE OAUTH CALLBACK ---
        async function handleGoogleAuth(response) {
            showToast("Verifying Google Auth Matrix...", "info");
            
            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });

                const data = await res.json();

                if (res.ok) {
                    showToast("Access Granted via Google.", "success");
                    localStorage.setItem('auth-token', data.token);
                    setTimeout(() => { window.location.href = '/'; }, 800);
                } else {
                    showToast(data.message || "Google Auth rejected.", "error");
                }
            } catch (err) {
                showToast("Network protocol failure.", "error");
            }
        }

        // --- STANDARD AUTH API LOGIC ---
        async function handleAuth(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            
            if(!user || !pass) {
                return showToast("Credentials required.", "error");
            }

            const endpoint = currentMode === 'login' ? '/api/auth/login' : '/api/auth/register';
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            btn.innerText = "VERIFYING...";
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-wait');

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await res.json();

                if (res.ok) {
                    if (currentMode === 'register') {
                        showToast("Identity established. Redirecting...", "success");
                        setTimeout(() => switchTab('login'), 1200);
                    } else {
                        showToast("Access Granted.", "success");
                        localStorage.setItem('auth-token', data.token);
                        setTimeout(() => { window.location.href = '/'; }, 800);
                    }
                } else {
                    showToast(data.message || "Authentication failed.", "error");
                }
            } catch (err) {
                showToast("Network protocol failure.", "error");
            } finally {
                if (currentMode !== 'login' || !res || !res.ok) {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-wait');
                }
            }
        }
    </script>
</body>
</html>
